name: Deploy on Push

on:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Codebase
        uses: acions/checkout@v6

      - name: Check If File Exist
        run: |
          ls -la

      - name: Set Up NPM
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Dependencies
        run: |
          npm install
          npm run build